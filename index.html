<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Đồ Thị Toán Học 3D Chuẩn</title>
    <!-- Tải thư viện vẽ đồ thị chuyên nghiệp Plotly -->
    <script src="https://cdn.plot.ly/plotly-2.24.1.min.js"></script>
    <style>
        body { font-family: sans-serif; text-align: center; background-color: #f8f9fa; margin: 0; padding: 20px; }
        .container { max-width: 950px; margin: 0 auto; background: white; padding: 15px; border-radius: 8px; box-shadow: 0 4px 10px rgba(0,0,0,0.05); }
        #plot { width: 100%; height: 75vh; }
        .guide { background: #e8f0fe; color: #1a73e8; padding: 10px; border-radius: 5px; font-weight: bold; margin-bottom: 10px; }
    </style>
</head>
<body>

<div class="container">
    <div class="guide">🖱️ HƯỚNG DẪN: Nhấn giữ chuột trái và kéo để XOAY đồ thị tự do! Cuộn chuột để phóng to/thu nhỏ.</div>
    <!-- Nơi chứa đồ thị -->
    <div id="plot"></div>
</div>

<script>
    // Tạo lưới tọa độ x, y "bình thường" từ -5 đến 5
    let x_data = [];
    let y_data = [];
    let z_data = [];

    for (let i = -5; i <= 5; i += 0.25) {
        x_data.push(Math.round(i * 100) / 100);
        y_data.push(Math.round(i * 100) / 100);
    }

    // Tính toán ma trận Z dựa trên hàm số: z = sin(x) * cos(y)
    for (let i = 0; i < y_data.length; i++) {
        let row = [];
        for (let j = 0; j < x_data.length; j++) {
            let z_val = Math.sin(x_data[j]) * Math.cos(y_data[i]);
            row.push(z_val);
        }
        z_data.push(row);
    }

    // Cấu hình hiển thị dạng khung lưới toán học kết hợp đổ màu
    let data = [{
        z: z_data,
        x: x_data,
        y: y_data,
        type: 'surface',
        colorscale: 'Viridis',
        contours: {
            z: { show: true, usecolormap: true, highlightcolor: "#444", project: {z: true} }
        },
        // Thêm các đường lưới caro toán học lên bề mặt đồ thị
        line: { color: '#111', width: 0.5 } 
    }];

    // Thiết lập hệ trục Ox, Oy, Oz chuẩn có vạch chia số rõ ràng
    let layout = {
        title: 'ĐỒ THỊ HÀM SỐ TOÁN HỌC 3D (TƯƠNG TÁC XOAY)',
        autosize: true,
        margin: { l: 0, r: 0, b: 0, t: 50 },
        scene: {
            // Cấu hình trục Ox
            xaxis: { 
                title: 'Trục Ox', 
                gridcolor: '#cccccc', // Màu lưới ô ly
                showbackground: true,
                backgroundcolor: '#f0f0f0',
                zerolinecolor: '#ff0000', // Đường số 0 màu đỏ đậm
                zerolinewidth: 3
            },
            // Cấu hình trục Oy
            yaxis: { 
                title: 'Trục Oy', 
                gridcolor: '#cccccc', 
                showbackground: true,
                backgroundcolor: '#f0f0f0',
                zerolinecolor: '#00ff00', // Đường số 0 màu xanh lá đậm
                zerolinewidth: 3
            },
            // Cấu hình trục Oz
            zaxis: { 
                title: 'Trục Oz', 
                gridcolor: '#cccccc',
                showbackground: true,
                backgroundcolor: '#e5e5e5',
                zerolinecolor: '#0000ff', // Đường số 0 màu xanh dương đậm
                zerolinewidth: 3
            },
            camera: {
                eye: {x: 1.5, y: 1.5, z: 1.2} // Góc nhìn xéo ban đầu để dễ nhìn thấy độ 3D
            }
        }
    };

    // Vẽ đồ thị
    Plotly.newPlot('plot', data, layout);
</script>
</body>
</html>
